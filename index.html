<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia Sesión</title>

    <!-- AGREGA ICONO DE LA PÁGINA (PESTAÑA) -->
    <link rel="icon" href="img/icon.png" type="image/png">

    <!-- FORMA 1 DE CREAR ESTILOS CON CSS -->
    <link rel="stylesheet" href="CSS/styles.css">
    
    <!-- Crea las propiedades que heredan todos por defecto todos los elementos de la página -->
    <style>
        body{
            background-color: #212738;
            font-family: "arial narrow", sans-serif;
            color: white;
            margin: 20px;
        }

        /*Establece de forma predeterminada el tipo de fuente de la página */
        *{
            font-family: "arial narrow", sans-serif;
        }

        /* Cambia los colores de seleccion de texto de la página*/
        ::selection{
        background: #D1D646;    /*Cambia de color el fondo del texto seleccionado*/
        color: black;           /*Cambia de color el texto al hacer la selección*/
        }
    </style>

</head>
<body>
    <h1>INICIA SESIÓN</h1>
    <br>
    <br>
    <form>
        <input type="email" name="email" id="email" placeholder="Correo electrónico" required>
        <br><br>
        <input type="password" name="password" id="password" placeholder="Contraseña" requireds>
        <br><br>
        <button type="submit" id="loginButton">Inicia sesión</button>
    </form>

    <br>
    <br>
    <a href="passwordRecorver.html">
